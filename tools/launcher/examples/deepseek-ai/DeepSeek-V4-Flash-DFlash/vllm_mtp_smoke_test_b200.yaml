# vLLM MTP smoke test for deepseek-ai/DeepSeek-V4-Flash-DFlash — B200 (umbriel) variant.
#
# Uses vllm/vllm-openai:deepseekv4-cu130 with DP=4.
# DEEPGEMM_TMPDIR=/cicd/deepgemm_tmp: deepgemm JIT uses NVCC to compile FP8 E8M0 kernels on B200.
#   - /tmp (container tmpfs) is too small → NVCC "cannot open /tmp/tmpxft_..." error
#   - /dev/shm is noexec → compiled .so dlopen fails with "failed to map segment"
#   - /cicd (NFS) is writable and executable (same as TRITON_CACHE_DIR=/cicd/triton-cache)
# We use DEEPGEMM_TMPDIR (not TMPDIR) so enroot doesn't read it at container startup
# (enroot calls mktemp -d $TMPDIR/enroot.XXX before the container starts). The script
# creates the directory and sets TMPDIR=$DEEPGEMM_TMPDIR inside the container.
#
# Usage:
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/deepseek-ai/DeepSeek-V4-Flash-DFlash/vllm_mtp_smoke_test_b200.yaml job_dir=/home/omniml_data_3/cicd --yes

job_name: DeepSeek-V4-Flash-DFlash_vllm_mtp_smoke_b200

pipeline:
  global_vars:
    hf_model: /hf-local/deepseek-ai/DeepSeek-V4-Flash

  task_0:
    script: common/specdec/vllm_smoke_test.sh
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - SPEC_METHOD: "mtp"
      - NUM_SPEC_TOKENS: "1"
      - DATA_PARALLEL_SIZE: "4"
      - KV_CACHE_DTYPE: "fp8"
      - BLOCK_SIZE: "256"
      - ENABLE_EXPERT_PARALLEL: "1"
      - TOKENIZER_MODE: "deepseek_v4"
      - REASONING_PARSER: "deepseek_v4"
      - TRUST_REMOTE_CODE: "1"
      - COPY_MODEL_TO_TMPFS: "1"
      - DEEPGEMM_TMPDIR: "/cicd/deepgemm_tmp"
      - BUILD_COMPILATION_CONFIG: "FULL_AND_PIECEWISE"
      - SERVER_TIMEOUT: "1800"
      - VLLM_ENGINE_READY_TIMEOUT_S: "1800"
    slurm_config:
      _factory_: "computelab_umbriel_slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 8
      container: "vllm/vllm-openai:deepseekv4-cu130"
