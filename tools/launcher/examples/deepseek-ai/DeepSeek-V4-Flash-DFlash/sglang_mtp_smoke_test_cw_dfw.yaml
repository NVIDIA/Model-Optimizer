# SGLang smoke test for deepseek-ai/DeepSeek-V4-Flash-DFlash — CW-DFW H100 variant.
#
# NUM_SPEC_TOKENS=0 disables EAGLE MTP (lmsysorg/sglang:deepseek-v4-blackwell has
# contradictory assertions for the EAGLE path on H100; plain inference still works).
# No Blackwell-specific backends needed; let SGLang auto-select for H100.
#
# Usage:
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/deepseek-ai/DeepSeek-V4-Flash-DFlash/sglang_mtp_smoke_test_cw_dfw.yaml --yes

job_name: DeepSeek-V4-Flash-DFlash_sglang_mtp_smoke_cw_dfw

pipeline:
  global_vars:
    hf_model: /hf-local/deepseek-ai/DeepSeek-V4-Flash

  task_0:
    script: common/specdec/sglang_smoke_test.sh
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - NUM_SPEC_TOKENS: "0"
      - DATA_PARALLEL_SIZE: "1"
      - TP_SIZE: "8"
      - TRUST_REMOTE_CODE: "1"
      - COPY_MODEL_TO_TMPFS: "1"
      - EXPERT_PARALLEL_SIZE: "1"
    slurm_config:
      _factory_: "cw_dfw_slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 8
      container: "lmsysorg/sglang:deepseek-v4-blackwell"
