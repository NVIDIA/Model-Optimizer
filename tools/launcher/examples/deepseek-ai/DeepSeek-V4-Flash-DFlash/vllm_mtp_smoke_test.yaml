# vLLM MTP smoke test for deepseek-ai/DeepSeek-V4-Flash-DFlash.
#
# Launches a vLLM server with MTP speculative decoding (self-draft, no separate draft model),
# sends 8 test prompts, and validates responses.
#
# Uses the official vllm/vllm-openai:deepseekv4-cu130 container with native DeepSeek V4 support.
# See: https://blog.vllm.ai/2026/04/24/deepseek-v4.html
#
# Usage:
#   uv run launch.py --yaml examples/deepseek-ai/DeepSeek-V4-Flash-DFlash/vllm_mtp_smoke_test.yaml --yes
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/deepseek-ai/DeepSeek-V4-Flash-DFlash/vllm_mtp_smoke_test.yaml --yes

job_name: DeepSeek-V4-Flash-DFlash_vllm_mtp_smoke

pipeline:
  global_vars:
    hf_model: /hf-local/deepseek-ai/DeepSeek-V4-Flash

  task_0:
    script: common/specdec/vllm_smoke_test.sh
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - SPEC_METHOD: "mtp"
      - NUM_SPEC_TOKENS: "1"
      - DATA_PARALLEL_SIZE: "8"
      - KV_CACHE_DTYPE: "fp8"
      - BLOCK_SIZE: "256"
      - ENABLE_EXPERT_PARALLEL: "1"
      - TOKENIZER_MODE: "deepseek_v4"
      - REASONING_PARSER: "deepseek_v4"
      - TRUST_REMOTE_CODE: "1"
      - COPY_MODEL_TO_TMPFS: "1"
      - VLLM_USE_DEEP_GEMM: "0"
      - FORCE_AF_V2: "1"
    slurm_config:
      _factory_: "computelab_umbriel_slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 8
      container: "vllm/vllm-openai:deepseekv4-cu130"
