# vLLM MTP smoke test for deepseek-ai/DeepSeek-V4-Flash-DFlash — CW-DFW H100 variant.
#
# Same as vllm_mtp_smoke_test.yaml but targets CW-DFW H100 nodes.
# Model on CW-DFW is block-FP8 (E4M3), not MXFP4, so runs on H100.
#
# Usage:
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/deepseek-ai/DeepSeek-V4-Flash-DFlash/vllm_mtp_smoke_test_cw_dfw.yaml --yes

job_name: DeepSeek-V4-Flash-DFlash_vllm_mtp_smoke_cw_dfw

pipeline:
  global_vars:
    hf_model: /hf-local/deepseek-ai/DeepSeek-V4-Flash

  task_0:
    script: common/specdec/vllm_smoke_test.sh
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - SPEC_METHOD: "mtp"
      - NUM_SPEC_TOKENS: "1"
      - TP_SIZE: "8"
      - KV_CACHE_DTYPE: "fp8"
      - BLOCK_SIZE: "256"
      - ENABLE_EXPERT_PARALLEL: "1"
      - TOKENIZER_MODE: "deepseek_v4"
      - REASONING_PARSER: "deepseek_v4"
      - TRUST_REMOTE_CODE: "1"
      - COPY_MODEL_TO_TMPFS: "1"
      - VLLM_USE_DEEP_GEMM: "1"
      - FORCE_AF_V2: "1"
      - GPU_MEM_UTIL: "0.85"
      - MAX_BATCHED_TOKENS: "4096"
    slurm_config:
      _factory_: "cw_dfw_slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 8
      container: "vllm/vllm-openai:deepseekv4-cu130"
