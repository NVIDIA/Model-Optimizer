# EAGLE3 data synthesis for deepseek-ai/DeepSeek-V4-Flash-DFlash — CW-DFW H100 variant.
#
# Serves the target model with vLLM (TP=8) and runs query.py to generate
# prompt+response pairs. Slurm array (0-7) shards the dataset across 8 nodes.
#
# Usage:
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/deepseek-ai/DeepSeek-V4-Flash-DFlash/hf_offline_eagle3_data_cw_dfw.yaml --yes

job_name: DeepSeek-V4-Flash-DFlash_EAGLE3_data_cw_dfw

pipeline:
  global_vars:
    hf_model: /hf-local/deepseek-ai/DeepSeek-V4-Flash


  task_0:
    script: common/vllm/query.sh
    args:
      - --model <<global_vars.hf_model>>
      - --tensor-parallel-size 8
      - --kv-cache-dtype fp8
      - --block-size 256
      - --enable-expert-parallel
      - --tokenizer-mode deepseek_v4
      - --trust-remote-code
      - --gpu-memory-utilization 0.85
      - --max-num-batched-tokens 4096
      - --
      - --data /hf-local/nvidia/Speculative-Decoding-Multilingual-Prompt-v2/default.jsonl
      - --save /lustre/fsw/portfolios/coreai/projects/coreai_dlalgo_modelopt/hf-local/nvidia/Speculative-Decoding-Multilingual-v2-DeepSeek-V4-Flash
      - --max-tokens 4096
      - --temperature 0.7
    environment:
      - VLLM_USE_DEEP_GEMM: "1"
      - FORCE_AF_V2: "1"
      - VLLM_ENGINE_READY_TIMEOUT_S: "900"
      - VLLM_STARTUP_TIMEOUT: "900"
    slurm_config:
      _factory_: "cw_dfw_slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 8
      container: "vllm/vllm-openai:deepseekv4-cu130"
      array: "0-7"
      retries: 20
      requeue: true
