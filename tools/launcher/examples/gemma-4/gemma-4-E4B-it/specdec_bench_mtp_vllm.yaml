# SPEED-bench MTP speculative-decoding run for gemma-4-E4B-it via vLLM.
#
# MTP support is not available in vllm/vllm-openai:latest on this cluster; use
# the qwen3_5-cu130 tag matching the existing MTP/vLLM SPEED-bench template.
#
# Slurm run on cw_dfw:
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/gemma-4/gemma-4-E4B-it/specdec_bench_mtp_vllm.yaml --yes

job_name: gemma-4-E4B-it_specdec_bench_mtp_vllm

pipeline:
  global_vars:
    hf_model: /hf-local/google/gemma-4-E4B-it

  # task_0: SPEED qualitative split
  task_0:
    script: common/specdec_bench/run.sh
    args:
      - --dataset speed
      - --dataset_path /hf-local/nvidia/SPEED-Bench-Internal/qualitative
      - --engine VLLM
      - --speculative_algorithm MTP
      - --draft_length 3
      - --tp_size 1
      - --ep_size 1
      - --concurrency 32
      - --runtime_params common/specdec_bench/_cells/gemma-4-E4B-it_mtp_vllm_t0_d3.yaml
      - --output_length 4096
      - --aa_timing
      - --show_progress
      - --save_dir /scratchspace/{sweep_name_default}/qualitative
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - HF_LOCAL: /hf-local
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
      container: vllm/vllm-openai:qwen3_5-cu130

  # task_1: SPEED throughput_32k split
  task_1:
    script: common/specdec_bench/run.sh
    args:
      - --dataset speed
      - --dataset_path /hf-local/nvidia/SPEED-Bench-Internal/throughput_32k
      - --engine VLLM
      - --speculative_algorithm MTP
      - --draft_length 3
      - --tp_size 1
      - --ep_size 1
      - --concurrency 8
      - --num_requests 80
      - --runtime_params common/specdec_bench/_cells/gemma-4-E4B-it_mtp_vllm_t0_d3.yaml
      - --output_length 4096
      - --aa_timing
      - --show_progress
      - --save_dir /scratchspace/{sweep_name_default}/throughput_32k
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - HF_LOCAL: /hf-local
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
      container: vllm/vllm-openai:qwen3_5-cu130
