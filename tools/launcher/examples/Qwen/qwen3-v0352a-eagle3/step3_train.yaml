# step3_train.yaml — offline EAGLE3 draft-head training for qwen3-v0352a-eagle3.
#
# This is a single-task pipeline extracted from the monolithic
# hf_offline_eagle3.yaml (task_2 / EAGLE3 offline training).
#
# step3_train reads hidden states produced by step2 from
# /scratchspace/offline_hidden_states.  When step3 runs as a
# separate Slurm job from step2 the scratchspace must persist
# across both jobs.
#
# JIRA: OMNIML-4628

job_name: qwen3-v0352a-eagle3_EAGLE3_train
pipeline:
  allow_to_fail: false
  skip: false
  note:

  global_vars:
    hf_model: /hf-local/Qwen/qwen3-v0352a-eagle3

  task_0:
    script: common/eagle3/train_eagle.sh
    args:
      - --config modules/Model-Optimizer/modelopt_recipes/general/speculative_decoding/eagle3.yaml
      - model.model_name_or_path=<<global_vars.hf_model>>
      - data.offline_data_path=/scratchspace/offline_hidden_states
      - training.output_dir=/scratchspace/eagle3
      - training.training_seq_len=4096
      - training.disable_tqdm=true
      - training.ar_validate_steps=500000
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 8
      container: nvcr.io/nvidia/tensorrt-llm/release:1.2.0
