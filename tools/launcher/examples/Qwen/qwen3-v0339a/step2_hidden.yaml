# Step 2 hidden-state dump pipeline for qwen3-v0339a.
#
# Extracted from the Qwen3-8B EAGLE3 offline pipeline.
# This standalone job dumps hidden states from the target model.
#
# Usage:
#   uv run slurm.py --yaml examples/Qwen/qwen3-v0339a/step2_hidden.yaml --dry-run

job_name: qwen3-v0339a_EAGLE3_hidden_dump
pipeline:
  allow_to_fail: false
  skip: false
  note:

  global_vars:
    hf_model: /hf-local/Qwen/qwen3-v0339a

  task_0:
    script: common/eagle3/dump_offline_data.sh
    args:
      - --input-data /scratchspace/data
      - --output-dir /scratchspace/offline_hidden_states
      - --max-seq-len 8192
      - --tp 8
      - --moe-ep 8
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 8
      gpus_per_node: 8
      container: nvcr.io/nvidia/tensorrt-llm/release:1.2.0
