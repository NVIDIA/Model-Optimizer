# SPEED-bench MTP speculative-decoding run for Qwen3.5-4B via vLLM.
#
# Companion to specdec_bench.yaml (the NONE/autoregressive baseline). This
# variant exercises Qwen3.5-4B's built-in MTP head (text_config.mtp_num_hidden_layers=1)
# with draft_length=3 to produce real acceptance-rate numbers instead of the
# trivial AR=1 that NONE yields.
#
# Three-task pipeline:
#   task_0  Quantitative quality split (nvidia/SPEED-Bench-Internal/qualitative)
#   task_1  Long-context throughput split (nvidia/SPEED-Bench-Internal/throughput_32k)
#   task_2  Upload both splits' results to S3 in sweep layout
#
# task_2 uploads /scratchspace/specdec_bench_mtp/ as a sweep dir; both
# qualitative/ and throughput_32k/ subdirs land under
# s3://team-specdec-workgroup/results/specdec_bench_mtp/<split>/. S3 creds
# are picked up from S3_ENDPOINT / S3_KEY_ID / S3_SECRET env vars.
#
# Slurm run on cw_dfw:
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/Qwen/Qwen3.5-4B/specdec_bench_mtp.yaml --yes

job_name: Qwen3.5-4B_specdec_bench_mtp

pipeline:
  global_vars:
    hf_model: /hf-local/Qwen/Qwen3.5-4B

  # Step 1: qualitative split — quality / acceptance-rate numbers with MTP draft=3
  task_0:
    script: common/specdec_bench/run.sh
    args:
      - --dataset speed
      - --dataset_path /hf-local/nvidia/SPEED-Bench-Internal/qualitative
      - --engine VLLM
      - --speculative_algorithm MTP
      - --draft_length 3
      - --tp_size 1
      - --ep_size 1
      - --concurrency 1
      - --output_length 4096
      - --aa_timing
      - --show_progress
      - --save_dir /scratchspace/specdec_bench_mtp/qualitative
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - HF_LOCAL: /hf-local
      # dump_env() in examples/specdec_bench/run.py reads provenance from these
      # env vars when present; they are intentionally NOT set here. Hardcoded
      # SHAs in a committed YAML would stale-lie about the build that's
      # actually running. Set them in the harness (planned for Phase 2 in
      # OMNIML-4788, where slurm.py / launch.py will compute and inject them
      # at launch time):
      #
      #   SPECDEC_BENCH_SHA  = git rev-parse HEAD:examples/specdec_bench
      #   MODELOPT_SHA       = git -C modules/Model-Optimizer rev-parse HEAD
      #   MODELOPT_VERSION   = modelopt.__version__ (or git describe --tags)
      #   NMM_SANDBOX_SHA    = git -C nmm-sandbox rev-parse HEAD
      #   CONTAINER_IMAGE    = slurm_config.container (the image:tag below)
      #
      # When run standalone (without the harness), dump_env falls back to
      # git rev-parse / module imports on the host filesystem.
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
      container: vllm/vllm-openai:qwen3_5-cu130

  # Step 2: throughput_32k split — long-context throughput with MTP draft=3
  task_1:
    script: common/specdec_bench/run.sh
    args:
      - --dataset speed
      - --dataset_path /hf-local/nvidia/SPEED-Bench-Internal/throughput_32k
      - --engine VLLM
      - --speculative_algorithm MTP
      - --draft_length 3
      - --tp_size 1
      - --ep_size 1
      - --concurrency 1
      - --output_length 4096
      - --aa_timing
      - --show_progress
      - --save_dir /scratchspace/specdec_bench_mtp/throughput_32k
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - HF_LOCAL: /hf-local
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
      container: vllm/vllm-openai:qwen3_5-cu130

  # Step 3: upload both splits to S3 in sweep layout
  task_2:
    script: common/specdec_bench/upload_to_s3.sh
    args:
      - /scratchspace/specdec_bench_mtp
      - s3://team-specdec-workgroup/results
      - --skip-existing
      - --allow-incomplete-provenance
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
      container: vllm/vllm-openai:qwen3_5-cu130
