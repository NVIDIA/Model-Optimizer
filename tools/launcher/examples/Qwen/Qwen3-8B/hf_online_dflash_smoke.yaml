# DFlash vLLM smoke test against random-weight draft checkpoint.
# Generated for OMNIML-4736.

job_name: Qwen3-8B_DFlash_smoke_random
pipeline:
  global_vars:
    hf_model: /hf-local/Qwen/Qwen3-8B

  task_0:
