# Runtime params for the SPEED-Bench throughput_32k split.
#
# Forces vLLM's AsyncEngineArgs.max_model_len to 40,960 (32K input +
# 4K output + 4K headroom) so the engine doesn't silently truncate
# 32K-token prompts under tight GPU-memory budgets — vLLM's default
# auto-derivation from the model config + gpu_memory_utilization can
# cap max_model_len lower than 36K on a single GPU.
#
# Used by tools/launcher/examples/Qwen/Qwen3.5-4B/specdec_bench{,_mtp}.yaml
# task_1; the qualitative task uses the engine default (no override
# needed, since its prompts top out at ~8K).

engine_args:
  max_model_len: 40960
