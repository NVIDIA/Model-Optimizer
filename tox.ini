[tox]
envlist=
    pre-commit-all
    py312-torch211-tf_latest-unit
    cuda13-gpu
    cuda13-gpu_regression
skipsdist = True
toxworkdir = /tmp/{env:USER}-modelopt-tox
passenv =
    SETUPTOOLS_SCM_PRETEND_VERSION

############################
# CPU Unit test environments
############################
[testenv:{py310,py311,py312,py313}-torch{28,29,210,211}-tf_{min,latest}-unit]
deps =
    # torch version auto-selected based on torchvision version
    torch28: torchvision~=0.23.0
    torch29: torchvision~=0.24.0
    torch210: torchvision~=0.25.0
    torch211: torchvision~=0.26.0

    -e .[all,dev-test]

    # Should match pyproject.toml
    tf_min: transformers~=4.56.0
commands =
    python -m pytest tests/unit {env:COV_ARGS:}


#####################################################################
# Environment to run unit tests with subset of dependencies installed
#####################################################################
[testenv:{py310,py311,py312,py313}-partial-unit-{onnx,torch,torch_deploy}]
allowlist_externals =
    bash, rm
deps =
    # Make sure torch 2.10 is used
    torchvision~=0.26.0

    # ONNX unit tests heavily rely on torch / torchvision
    onnx: .[onnx,dev-test]
    onnx: torchvision

    # Install megatron-core to test torch-only install can still import plugins
    torch: megatron-core
    # diffusers is needed for unit tests of the sparse-attention/quantization diffusers backend
    torch: diffusers
    torch: .[dev-test]

    torch_deploy: .[onnx,torch,dev-test]
commands =
    onnx: python -m pytest tests/unit/onnx
    torch: python -m pytest tests/unit/torch --ignore tests/unit/torch/deploy --ignore tests/unit/torch/puzzletron
    torch_deploy: python -m pytest tests/unit/torch/deploy


###########################################################
# GPU test environments (Should be used with --current-env)
###########################################################
# Container: nvcr.io/nvidia/pytorch:26.01-py3 or later
[testenv:cuda13-gpu]
commands_pre =
    # Install deps here so that it gets installed even in --current-env
    python -m pip install --no-build-isolation git+https://github.com/Dao-AILab/fast-hadamard-transform.git
    python -m pip install -e .[all,dev-test]

    # Install cupy-cuda13x for INT4 ONNX quantization (default is cupy-cuda12x)
    python -m pip uninstall -y cupy-cuda12x
    python -m pip install cupy-cuda13x

    # Install mamba and causal-conv1d for Nemotron tests
    python -m pip install --no-build-isolation git+https://github.com/state-spaces/mamba.git
    python -m pip install --no-build-isolation git+https://github.com/Dao-AILab/causal-conv1d.git
commands =
    python -m pytest tests/gpu {env:COV_ARGS:}

[testenv:cuda13-gpu_regression]
commands_pre =
    python -m pip install -e .[hf,dev-test]
commands =
    python -m pytest tests/gpu_regression {env:COV_ARGS:}

# Container: nvcr.io/nvidia/nemo:26.02 or later
# NOTE: tox is bypassed for this env in CI (see gpu_tests.yml) because tox-current-env is
# incompatible with uv venvs, and any new tox env would lack NeMo/Megatron packages from /opt/venv.
# [testenv:cuda13-gpu_megatron]
# commands_pre =
#     python -m pip install -e .[hf,dev-test]
# commands =
#     python -m pytest tests/gpu_megatron {env:COV_ARGS:}

# Container: nvcr.io/nvidia/tensorrt-llm/release:1.2.0 or later
[testenv:cuda13-gpu_trtllm]
commands_pre =
    # Install deps here so that it gets installed even in --current-env
    python -m pip install -e .[hf,dev-test]
commands =
    python -m pytest tests/gpu_trtllm {env:COV_ARGS:}

#############################################
# Code quality checks on all files or on diff
#############################################
[testenv:{pre-commit}-{all,diff}]
deps =
    -e .[all,dev-lint]
commands =
    all: pre-commit run --all-files --show-diff-on-failure {posargs}
    diff: pre-commit run --from-ref origin/main --to-ref HEAD {posargs}


#########################
# Run documentation build
#########################
[testenv:{build,debug}-docs]
allowlist_externals =
    rm
deps =
    -e .[all,dev-docs]
changedir = docs
commands_pre =
    rm -rf build
    rm -rf source/reference/generated
commands =
    sphinx-build source build/html --fail-on-warning --show-traceback --keep-going
    debug: sphinx-autobuild source build/html --host 0.0.0.0


#################
# Run wheel build
#################
[testenv:build-wheel]
allowlist_externals =
    bash, cd, rm
deps =
    twine
commands =
    # Clean build directory to avoid any stale files getting into the wheel
    rm -rf build

    # Build and check wheel
    pip wheel --no-deps --wheel-dir=dist .
    twine check dist/*

    # Install and test the wheel
    bash -c "find dist -name 'nvidia_modelopt-*.whl' | xargs pip install -f dist"
    bash -c "cd dist; python -c 'import modelopt; print(modelopt.__version__);'"
