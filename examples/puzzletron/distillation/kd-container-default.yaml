# ---------------------------------------------------------------------------
# Tokenizer (override to NullTokenizer + vocab_size for mock-token runs)
# ---------------------------------------------------------------------------
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  # Omit ``tokenizer_model`` here so distill.py can set it from ``--student-checkpoint``.

# ---------------------------------------------------------------------------
# Checkpoint
# ---------------------------------------------------------------------------
checkpoint:
  save_interval: 100
  save: ./outputs/kd-checkpoints
  load: ./outputs/kd-checkpoints
  most_recent_k: 5
  ckpt_format: torch_dist
  async_save: true
  fully_parallel_save: true
  save_optim: true

# ---------------------------------------------------------------------------
# Logger
# ---------------------------------------------------------------------------
logger:
  log_interval: 1
  tensorboard_dir: ./outputs/tb
  log_timers_to_tensorboard: true
  wandb_project: gpt_oss_distillation
  wandb_exp_name: any_model_gpt_oss_120b-kd-mbridge-v6
  wandb_entity: nv-aim
  wandb_save_dir: /lustre/fsw/portfolios/llmservice/users/mchochowski/puzzletron/workspaces/any_model_gpt_oss_20b/kd/puzzle_solutions/stats_num_params_11914757184/from-120B-mbridge-v6/wandb   # optional

# ---------------------------------------------------------------------------
# RNG / distributed / precision
# ---------------------------------------------------------------------------
rng:
  seed: 42

dist:
  distributed_timeout_minutes: 180

mixed_precision: bf16_mixed
