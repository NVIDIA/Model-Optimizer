# Default Megatron Bridge ConfigContainer layout for examples/puzzletron/distillation/distill.py
# Merge order: _pretrain_common() skeleton → this file → Hydra-style CLI overrides.
#
# Paths below are placeholders — override for your environment.

# ---------------------------------------------------------------------------
# Model (DistillationProvider + TransformerConfig fields)
# ---------------------------------------------------------------------------
model:
  # Heterogeneous AnyModel / per-layer MoE: distinct checkpoint keys per global layer.
  hetereogenous_dist_checkpoint: true

  pipeline_dtype: torch.bfloat16
  seq_length: &seqlen 4096

  cross_entropy_fusion_impl: native

  kd_config:
    logit_layers:
      - output_layer
      - output_layer
    skip_lm_loss: true
    kd_loss_scale: 1.0
    logit_kl_temperature: 1.0

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
train:
  train_iters: 1000
  global_batch_size: 256
  micro_batch_size: 1
  manual_gc: true
  manual_gc_interval: 100

# ---------------------------------------------------------------------------
# Validation (preferred over deprecated train.eval_* fields)
# ---------------------------------------------------------------------------
validation:
  eval_interval: 10
  eval_iters: 10

# ---------------------------------------------------------------------------
# Optimizer / scheduler (matches distributed_fused_adam_with_cosine_annealing defaults)
# ---------------------------------------------------------------------------

optimizer:
  optimizer: adam
  lr: 3.0e-6
  min_lr: 3.0e-7
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-8
  bf16: true
  fp16: false
  use_distributed_optimizer: true
  clip_grad: 1.0

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 100
  min_lr: 3.0e-8

# ---------------------------------------------------------------------------
# DDP
# ---------------------------------------------------------------------------
ddp:
  check_for_nan_in_grad: true
  grad_reduce_in_fp32: true
  overlap_grad_reduce: true
  # Required false when use_distributed_optimizer is false (Megatron).
  overlap_param_gather: false
  average_in_collective: true
  use_distributed_optimizer: false

# ---------------------------------------------------------------------------
# Dataset
#
# Provide either ``per_split_data_args_path`` (path to a JSON describing the
# per-split blends) OR ``blend_per_split`` (inline list of [paths, weights]
# tuples for train / valid / test). Override these via Hydra-style CLI args
# or a downstream YAML.
#
# Example inline blend_per_split:
#   blend_per_split:
#     - - - /path/to/train_shard_00_text_document
#         - /path/to/train_shard_01_text_document
#       - [0.5, 0.5]
#     - - - /path/to/valid_text_document
#       - [1.0]
#     - - - /path/to/test_text_document
#       - [1.0]
# ---------------------------------------------------------------------------
dataset:
  seq_length: *seqlen
  per_split_data_args_path: null  # e.g. /path/to/blend_spec.json
  path_to_cache: ./outputs/datasets_cache
  random_seed: 1234
  reset_attention_mask: False
  reset_position_ids: False
  eod_mask_loss: False
  num_dataset_builder_threads: 1
  data_sharding: True
  dataloader_type: "cyclic"
  skip_getting_attention_mask_from_dataset: True
  num_workers: 1
  blend: null
  split: null
  blend_per_split: null

# ---------------------------------------------------------------------------
# Tokenizer (override to NullTokenizer + vocab_size for mock-token runs)
# ---------------------------------------------------------------------------
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  # Omit ``tokenizer_model`` here so distill.py can set it from ``--student-checkpoint``.

# ---------------------------------------------------------------------------
# Checkpoint
# ---------------------------------------------------------------------------
checkpoint:
  save_interval: 100
  save: ./outputs/kd-checkpoints
  load: ./outputs/kd-checkpoints
  most_recent_k: 5
  ckpt_format: torch_dist
  async_save: true
  fully_parallel_save: true
  save_optim: true

# ---------------------------------------------------------------------------
# Logger
# ---------------------------------------------------------------------------
logger:
  log_interval: 1
  tensorboard_dir: ./outputs/tb
  log_timers_to_tensorboard: true
  # Optional Weights & Biases logging — leave null to disable, or override per run.
  wandb_project: null
  wandb_exp_name: null
  wandb_entity: null
  wandb_save_dir: ./outputs/wandb

# ---------------------------------------------------------------------------
# RNG / distributed / precision
# ---------------------------------------------------------------------------
rng:
  seed: 42

dist:
  distributed_timeout_minutes: 180

mixed_precision: bf16_mixed
