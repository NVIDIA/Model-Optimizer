defaults:
  - /pruning/pruning_defaults@_here_

# Score per-KV-head importance and create the pruned-checkpoint variants used
# to build the replacement library.
hook_class: ${get_object:modelopt.torch.prune.importance_hooks.base_hooks.IndependentKvHeadContributionHook}

activations_log_dir: ${puzzle_dir}/pruning/pruning_scores/attn_${pruning.activation_hooks_kwargs.method}/${pruning.experiment_id}

pruning_mixin:
  _target_: modelopt.torch.puzzletron.pruning.kv_heads_pruning_mixin.KVHeadsPruningMixIn
  layer_descriptor:
    _target_: modelopt.torch.puzzletron.anymodel.models.nemotron_h.nemotron_h_model_descriptor.NemotronHKVHeadsLayerDescriptor

activation_hooks_kwargs:
  method: independent_kv_head_contribution
  optimize_for: memory
  target_layer: "mixer.o_proj"           # Nemotron-H attention is under `mixer`, not `self_attn`
  layer_input_descriptors_path:

# Teacher: num_attention_heads = 32, num_key_value_heads = 2 (n_heads_in_group = 16)
# Single 1-KV-head variant: n_heads_in_group = 32 → num_kv_heads = 32 / 32 = 1
n_heads_in_group_list: [32]
gqa_init_mode: "PruneKVHeads"
