defaults:
  - ../qwen3_5-0.8b_pruneffn_memory/pruning/ffn_pruning@pruning
  - ../qwen3_5-0.8b_pruneffn_memory/validate_solutions_defaults@scoring
  - ../qwen3_5-0.8b_pruneffn_memory/validate_solutions_defaults@realize_model
  - bypass: defaults
  - override hydra/hydra_logging: disabled
  - _self_

puzzle_dir: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_llm/users/ssameni/engineering/modelopt_qwen/puzzle_dir
descriptor: qwen3_5
teacher_dir: ${puzzle_dir}/ckpts/teacher/
replacement_library_path: ${puzzle_dir}/replacement_library.json

# Input Hugging Face model to compress
input_hf_model_path: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_llm/users/ssameni/hf_cache/Qwen/Qwen3.5-0.8B/

# Dataset path for pruning, NAS scoring, and bypass distillation
dataset_path: /lustre/fsw/portfolios/coreai/users/dkorzekwa/experiments/12_15_anymodel_for_modelopt/datasets/Nemotron-Post-Training-Dataset-v2

skip_realize_model: false

build_replacement_library:
  add_ffn_no_ops: true
  add_attention_no_ops: true

scoring:
  descriptor: ${descriptor}
  solutions_to_validate:
  skip_existing_solutions: true

  replacement_library_path: ${replacement_library_path}
  solutions_path: ${to_path:${puzzle_dir}/single_sequence_replacement_solutions.json}
  teacher_dir: ${to_path:${teacher_dir}}
  output_dir: ${puzzle_dir}/single_sequence_replacement_solutions--validation

  eval_samples: 128
  micro_batch_size: 1
  seed: 42
  shuffle_seed: 444
  dataset_path: ${dataset_path}

calc_subblock_stats:
  batch_sizes: [1]
  prefill_seq_len: 8192
  generation_seq_len: 8192
  runtime_stats:
    backend: vllm
    enabled: true
    num_warmup_iters: 1
    num_iters: 3
  merge_with_existing_stats: false
  subblock_stats_filename: "subblock_stats.json"

# FFN alternatives for Qwen3.5-0.8B. Teacher intermediate size is 3584;
# search the i/8 * 3584 grid for i in 1..7 (448-step multiples, all strictly
# pruned). The unpruned 3584 width stays reachable via the teacher block and
# the FFN no-op. Keep this list in sync with the bypass `configs` below.
pruning:
  pruning_mixin:
    _target_: modelopt.torch.puzzletron.pruning.ffn_intermediate_pruning_mixin.FFNIntermediatePruningMixIn
    layer_descriptor:
      _target_: modelopt.torch.puzzletron.anymodel.models.qwen3_5.qwen3_5_model_descriptor.Qwen3P5VLFFNIntermediateLayerDescriptor
  intermediate_size_list: [448, 896, 1344, 1792, 2240, 2688, 3136]

mip:
  single_block_replacement_validation_dir: ${to_path:${scoring.output_dir}}
  subblock_stats_path: ${to_path:${puzzle_dir}/${calc_subblock_stats.subblock_stats_filename}}
  output_path: ${to_path:${puzzle_dir}/mip/puzzle_solutions_params75}
  gathered_metrics_path:
  puzzle_profile:

  objective: metrics.cosine_embedding_loss_hidden_states
  bigger_is_better: false

  subblock_stats_args:
    - batch_size: 1
      weights_dtype: torch.bfloat16
      activations_dtype: torch.bfloat16
      kv_cache_dtype: torch.bfloat16

  human_constraints:
    - num_params_ratio: 0.75

  mip_constraints:
  metric_overrides:
  max_seconds_per_solution: 60

  report_additional_costs:
    - stats.memory_mib
    - stats.num_params
    - stats.num_kv_heads
    - stats.has_attention
    - stats.has_ffn
    - stats.kv_cache_memory_mib
    - stats.attention_memory_mib
    - stats.ffn_memory_mib
    - stats.ffn_num_params
    - stats.attention_num_params

realize_model:
  descriptor: ${descriptor}
  teacher_dir: ${to_path:${teacher_dir}}
  tokenizer_name: ${to_path:${teacher_dir}}
  replacement_library_path: ${replacement_library_path}
  save_models: true
  solutions_path:

  skip_validation: false
  eval_samples: 128
  micro_batch_size: 1
  seed: 42
  shuffle_seed: 444
  dataset_path: ${dataset_path}

# vLLM latency stats launch many subprocesses, so keep the process group alive.
nccl_timeout_minutes: ${timedelta_minutes:120}

hydra:
  run:
    dir: ${puzzle_dir}/hydra_logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
