defaults:
  - qwen3_5
  - _self_

# Input Hugging Face model to compress
input_hf_model_path: /workspace/hf_models/Qwen/Qwen3.5-0.8B

# Dataset path for pruning and NAS scoring
dataset_path: /workspace/datasets/Puzzle-KD-Nemotron-Post-Training-Dataset-v2

# Working directory for compression outputs
puzzle_dir: /workspace/puzzle_dir_qwen3_5-0.8b

# MIP memory constraint (in MiB)
mip:
  human_constraints:
    target_memory: 10_000 # 10 GiB
  # Memory sweep configuration (optional)
  sweep:
    enabled: false
    memory_compression_rates: [0.5, 0.6, 0.7, 0.8, 0.9, 1.0]
    output_csv: ${puzzle_dir}/mip_sweep_results.csv

# FFN intermediate sizes to search over (heterogeneous architecture)
# teacher_intermediate_size is 3584
pruning:
  intermediate_size_list: [768, 1536, 2048, 3072]
