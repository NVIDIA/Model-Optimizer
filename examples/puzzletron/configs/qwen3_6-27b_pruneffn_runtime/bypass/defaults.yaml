# @package bypass
# Bypass distillation for Qwen3.6-27B (real run).
#
# NOTE: a 27B teacher+student won't fit data-parallel on one 80GB GPU regardless
# of block_size; the bypass training loop must shard the model (FSDP). block_size
# 16384 keeps activations modest; if it still OOMs, reduce further or add nodes /
# grad accumulation.

dtype: "bf16"
seed: 42

experiment_id:
experiment_dir:
iter_num: 1
step_num: 1
token_count: 0

data:
  data_column: "messages"
  block_size: 16384
  bos_rate: 0.5
  fim_rate: 0
  fim_spm_rate: 0
  source_datasets_to_discard: []
  load_from_disk: true
  keep_in_memory: true
  val_dataset_name: validation
  max_eval_samples: 32
  eval_samples_per_process:
  shuffle_train_data_seed: ${random_int:0,9999}
  # Disk cache for the realized (tokenized + packed) validation set.
  realized_cache_dir: ${puzzle_dir}/dataset_cache

training:
  learning_rate: 1e-4
  training_tokens: 16777216 # 16384 * 1024 -> 1024 optimizer steps (block_size 16384, mbs 1, grad_accum 1)
  micro_batch_size: 1
  val_micro_batch_size: 1
  warmup_ratio: 0.05
  warmup_steps: ${warmup_steps:${.training_tokens},${..data.block_size},${.micro_batch_size},${.grad_accumulation_steps},${.warmup_ratio}}
  min_lr_factor: 1e-5
  grad_accumulation_steps: 1
  skip_first_batches: 0
  weight_decay: 0.1
  decay_lr: true
  beta1: 0.9
  beta2: 0.95
  use_grad_scaling: false
  grad_clip: 1.0
  grad_clip_type: norm
  clipping_count: 0
  log_interval: 32
  eval_interval: 128

resume_checkpoint_path:
find_last_ckpt_for_resume: true
parameter_count:
init_checkpoint_path:

model:
  student_weights_dtype: "bf16"

  model_overrides:
    delete_old_checkpoints: true
    save_interval_seconds: 12900
    save_interval: 1e+9
    save_checkpoint_when_done: true

  model_config_overrides: {}

model_factory:
  factory: bypass_factory_fn
  block_loss_func: normalized_mse_loss
  gqa_init_mode: AverageKV
  mlp_init_mode: PruneByActivationsLog
  mlp_init_config:
    activations_log_dir: ${pruning.activations_log_dir}
  linear_init_mode: FromTeacher
  submodule_for_loss_calculation:
  keys_to_learn:

disable_initial_validate: false
validate_teacher_model: true
validate_student_model: true
disable_validation: false
best_val_loss: 1e+9

compile: false
disable_fa2: false
teacher_model_load_on_cpu: false

save_checkpoint_before_training: false
disable_checkpoint_save: false
save_best_ckpt: true
kill_after_first_save: false
realize_best_or_latest: "best"

wandb_log: false
wandb:
  project:
  entity:

# One bypass-distillation job per searched subblock variant. The FFN sizes must
# stay in sync with pruning.intermediate_size_list in the main config; attention
# prunes the 4 KV heads down to 2 and to 1 (base model has 4 KV heads /
# 24 attention heads).
configs:
  - model_config_overrides:
      ffn:
        - intermediate_size: 8192
    keys_to_learn: subblock_ffn
  - model_config_overrides:
      ffn:
        - intermediate_size: 7168
    keys_to_learn: subblock_ffn
  - model_config_overrides:
      ffn:
        - intermediate_size: 6144
    keys_to_learn: subblock_ffn
  - model_config_overrides:
      ffn:
        - intermediate_size: 5120
    keys_to_learn: subblock_ffn
  - model_config_overrides:
      ffn:
        - intermediate_size: 4096
    keys_to_learn: subblock_ffn
  - model_config_overrides:
      ffn:
        - intermediate_size: 3072
    keys_to_learn: subblock_ffn
  - model_config_overrides:
      ffn:
        - intermediate_size: 2048
    keys_to_learn: subblock_ffn
  - model_config_overrides:
      attention:
        - num_key_value_heads: 2
    keys_to_learn: subblock_attention
  - model_config_overrides:
      attention:
        - num_key_value_heads: 1
    keys_to_learn: subblock_attention
