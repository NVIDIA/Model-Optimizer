model_dtype: torch.bfloat16 # dtype to cast the model for validate_model
autocast_dtype: torch.bfloat16 # dtype for torch.autocast for validate_model
# Shared sequence length for single-block-replacement scoring, realize-model
# evaluation, and activation/pruning stats (matches bypass data.block_size).
block_size: 16384 # 16 * 1024
bos_rate: 0.5
data_column: messages
val_dataset_name: validation
shuffle_seed: 81436
seed: 42
fim_rate: 0
fim_spm_rate: 0
source_datasets_to_discard:
varlen: false
write_results: false
calc_losses_on_cpu: false
activations_log_dir:
model_name_or_path:
load_dataset_fn: ${get_object:modelopt.torch.puzzletron.utils.data.dataloaders.load_from_disk_fn}
# Disk cache for the realized (tokenized + packed) validation set. Skips the
# expensive single-process re-tokenization on every run. Shared by scoring,
# realize-model eval, and activation/pruning stats.
realized_dataset_cache_dir: ${puzzle_dir}/dataset_cache
