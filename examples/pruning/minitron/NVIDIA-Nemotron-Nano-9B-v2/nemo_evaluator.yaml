# NeMo Evaluator Launcher config for Nemotron-Nano-9B-v2 Pruned 7B evaluation
#
# Usage:
#   pip install "nemo-evaluator-launcher[all]==0.1.90"
#
#   # Set required environment variables:
#   export HF_TOKEN=<your_huggingface_token>
#   export API_KEY=<your_api_key>
#   export INFERENCE_API_KEY=<your_inference_api_key>
#   export JUDGE_API_KEY=<your_judge_api_key>
#   export OPENAI_CLIENT_ID=<your_openai_client_id>
#   export OPENAI_CLIENT_SECRET=<your_openai_client_secret>
#   export SLURM_JOB_DIR=<path_to_slurm_job_output_dir>
#   export HF_HOME=<path_to_huggingface_cache>
#   export VLLM_CACHE_ROOT=<path_to_vllm_cache>
#
#   # Update checkpoint_path below, then run:
#   nemo-evaluator-launcher run --config nemo_evaluator.yaml
#

defaults:
  - execution: slurm/default
  - deployment: vllm
  - _self_

execution:
  type: slurm
  hostname: <your_slurm_hostname>
  username: ${oc.env:USER}
  account: <your_slurm_account>
  partition: batch
  num_nodes: 1
  ntasks_per_node: 1
  gpus_per_node: 8
  gres: "gpu:8"
  walltime: 04:00:00
  sbatch_comment: "{\"OccupiedIdleGPUsJobReaper\":{\"exemptIdleTimeMins\":\"1920\",\"reason\":\"benchmarking\",\"description\":\"Some evals need idle time\
    \ else gets cancelled\"}}"
  subproject: nel
  output_dir: ${oc.env:SLURM_JOB_DIR}
  mode: sequential

  mounts:
    mount_home: false
  deployment:
    n_tasks: 1
  batch_comment: "{\"OccupiedIdleGPUsJobReaper\":{\"exemptIdleTimeMins\":\"1920\",\"reason\":\"benchmarking\",\"description\":\"Required data validation\
    \ and evaluation\"}}"

# Note: Only tp=1 works for Nano (Mamba-based architecture)
deployment:
  # Update this to your distilled checkpoint path
  checkpoint_path: /path/to/distilled/checkpoint/hf_iter_XXXXXX
  served_model_name: nemotron-nano-9b-v2-pruned-7b
  port: 8000
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  data_parallel_size: 8
  gpu_memory_utilization: 0.8
  extra_args: "--trust-remote-code --no-enable-prefix-caching --mamba_ssm_cache_dtype float32 --model-loader-extra-config '{\"enable_multithread_load\"\
    : true, \"num_threads\": 96}' --kv-cache-dtype fp8 "
  env_vars:
    VLLM_ATTENTION_BACKEND: FLASH_ATTN
  endpoints:
    chat: /v1/chat/completions
    completions: /v1/completions
    health: /health
  multiple_instances: true

evaluation:
  nemo_evaluator_config:
    target:
      api_endpoint:
        adapter_config:
          use_system_prompt: true
          use_reasoning: false
          params_to_add:
            chat_template_kwargs:
              enable_thinking: true
            skip_special_tokens: false
          use_caching: true
          tracking_requests_stats: true
          log_failed_requests: true
          use_request_logging: true
          max_logged_requests: 10
          use_response_logging: true
          max_logged_responses: 10
    config:
      params:
        parallelism: 64
        max_new_tokens: 32768
        temperature: 0.6
        top_p: 0.95
        request_timeout: 3600
        max_retries: 10
        extra:
          tokenizer_backend: huggingface
          # Update tokenizer path to match checkpoint_path above
          tokenizer: /path/to/distilled/checkpoint/hf_iter_XXXXXX
  env_vars:
    API_KEY: API_KEY
    HF_TOKEN: HF_TOKEN
    JUDGE_API_KEY: JUDGE_API_KEY
    INFERENCE_API_KEY: INFERENCE_API_KEY
    OPENAI_CLIENT_ID: OPENAI_CLIENT_ID
    OPENAI_CLIENT_SECRET: OPENAI_CLIENT_SECRET

  tasks:
    # 1. MMLU Pro
    - name: ns_mmlu_pro
      env_vars:
        HF_TOKEN: HF_TOKEN
      nemo_evaluator_config:
        config:
          params:
            # limit_samples: 8
            extra:
              num_repeats: 1
              args: "++prompt_config=eval/aai/mcq-10choices-boxed"

    # 2. GPQA Diamond
    - name: ns_gpqa
      env_vars:
        HF_TOKEN: HF_TOKEN
      nemo_evaluator_config:
        config:
          params:
            # limit_samples: 8
            extra:
              num_repeats: 8
              args: "++prompt_config=eval/aai/mcq-4choices"

    # 3. LiveCodeBench
    - name: ns_livecodebench
      env_vars:
        HF_TOKEN: HF_TOKEN
      nemo_evaluator_config:
        config:
          params:
            # limit_samples: 8
            extra:
              num_repeats: 8
              dataset_split: test_v6_2408_2505

    # 4. AIME 2025
    - name: ns_aime2025
      env_vars:
        HF_TOKEN: HF_TOKEN
      nemo_evaluator_config:
        config:
          params:
            # limit_samples: 8
            extra:
              num_repeats: 64

    # 5. MATH500
    - name: AA_math_test_500
      env_vars:
        JUDGE_API_KEY: JUDGE_API_KEY
        HF_TOKEN: HF_TOKEN
      nemo_evaluator_config:
        config:
          params:
            # limit_samples: 8
            extra:
              n_samples: 5

    # 6. IFEval
    - name: ns_ifeval
      env_vars:
        HF_TOKEN: HF_TOKEN

    # 7. SciCode
    - name: ns_scicode
      env_vars:
        HF_TOKEN: HF_TOKEN
      nemo_evaluator_config:
        config:
          params:
            # limit_samples: 8
            max_new_tokens: 8192
            extra:
              num_repeats: 8
