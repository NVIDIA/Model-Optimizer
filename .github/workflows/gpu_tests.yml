name: GPU tests

on:
  push:
    branches: ["pull-request/[0-9]+"]
    # NOTE: paths cannot be used since push happens to copied PR and only latest commit to PR is used
  schedule:
    - cron: "0 0 * * *" # Nightly
  workflow_dispatch:
    # On-demand

concurrency:
  # Cancel previous runs if new commit is pushed to the same PR
  group: ${{ github.workflow }}-${{ startsWith(github.ref, 'refs/heads/pull-request/') && github.ref || github.sha }}
  cancel-in-progress: true

jobs:
  pr-gate:
    uses: ./.github/workflows/_pr_gate.yml
    permissions:
      checks: read
    secrets: inherit
    with:
      files: |
        .github/workflows/gpu_tests.yml
        modelopt/**
        noxfile.py
        pyproject.toml
        tests/gpu/**
        tests/gpu_megatron/**
        tests/gpu_trtllm/**
        tests/gpu_vllm/**

  gpu-tests:
    needs: [pr-gate]
    if: needs.pr-gate.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: gpu
            timeout: 75
            container_image: pytorch:26.04-py3
          - example: gpu_megatron
            timeout: 45
            container_image: nemo:26.04
          - example: gpu_trtllm
            timeout: 30
            container_image: tensorrt-llm/release:1.3.0rc16
    runs-on: ${{ startsWith(github.ref, 'refs/heads/pull-request/') && 'linux-amd64-gpu-rtxpro6000-latest-1' || 'linux-amd64-gpu-rtxpro6000-latest-2' }}
    timeout-minutes: ${{ matrix.timeout }}
    container:
      image: nvcr.io/nvidia/${{ matrix.container_image }}
      credentials:
        username: $oauthtoken
        password: ${{ secrets.NGC_API_KEY }}
      env:
        GIT_DEPTH: 1000 # For correct version
        PIP_CONSTRAINT: "" # Disable pip constraint for upgrading packages
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/gpu-test-run
        with:
          example: ${{ matrix.example }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  # Docker Hub image: anonymous pull (no ``credentials:``) and no coverage
  gpu-tests-vllm:
    needs: [pr-gate]
    if: needs.pr-gate.outputs.any_changed == 'true'
    runs-on: ${{ startsWith(github.ref, 'refs/heads/pull-request/') && 'linux-amd64-gpu-rtxpro6000-latest-1' || 'linux-amd64-gpu-rtxpro6000-latest-2' }}
    timeout-minutes: 30
    container:
      image: docker.io/vllm/vllm-openai:v0.20.0
      env:
        GIT_DEPTH: 1000 # For correct version
        PIP_CONSTRAINT: "" # Disable pip constraint for upgrading packages
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/gpu-test-run
        with:
          example: gpu_vllm
          with_coverage: "false"

  gpu-pr-required-check:
    # Run even if any of the gpu jobs is skipped
    if: ${{ startsWith(github.ref, 'refs/heads/pull-request/') && always() }}
    needs: [pr-gate, gpu-tests, gpu-tests-vllm]
    runs-on: ubuntu-latest
    steps:
      - name: Required GPU tests did not succeed
        if: ${{ needs.pr-gate.result != 'success' || (needs.pr-gate.outputs.any_changed == 'true' && (needs.gpu-tests.result != 'success' || needs.gpu-tests-vllm.result != 'success')) }}
        run: exit 1
