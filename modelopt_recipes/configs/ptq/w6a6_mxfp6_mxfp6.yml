quant_cfg:
  "*weight_quantizer":
    num_bits: e3m2  # MXFP6 e3m2: [exponent_bits, mantissa_bits]
    block_sizes:
      -1: 32        # 32-element groups along the last dimension (MXFP6 standard tile)
      type: dynamic  # Block scales recomputed at each inference step
      scale_bits: e8m0  # e8m0 per-block scale factors (MX standard: 8-bit exponent, no mantissa)
    enable: true
  "*input_quantizer":
    num_bits: e3m2  # MXFP6 e3m2
    block_sizes:
      -1: 32
      type: dynamic
      scale_bits: e8m0  # e8m0 per-block scale factors (MX standard)
    enable: true
