quant_cfg:
  "*weight_quantizer":
    num_bits: [2, 1]  # MXFP4 E2M1: [exponent_bits, mantissa_bits]
    block_sizes:
      -1: 32        # 32-element groups along the last dimension (MXFP4 standard tile)
      type: dynamic  # Block scales recomputed at each inference step
      scale_bits: [8, 0]  # E8M0 per-block scale factors (MX standard: 8-bit exponent, no mantissa)
    enable: true
  "*input_quantizer":
    num_bits: [2, 1]  # MXFP4 E2M1
    block_sizes:
      -1: 32
      type: dynamic
      scale_bits: [8, 0]  # E8M0 per-block scale factors (MX standard)
    enable: true
