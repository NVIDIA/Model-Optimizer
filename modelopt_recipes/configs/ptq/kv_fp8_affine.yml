quant_cfg:
  '*[kv]_bmm_quantizer':
    num_bits: [4, 3]  # FP8 E4M3: [exponent_bits, mantissa_bits] (float8_e4m3fn)
    bias:
      -2:         # Affine offset applied along dim -2 (sequence / head dimension)
      -4:         # Affine offset applied along dim -4
      type: static  # Bias computed once at calibration, fixed at inference
