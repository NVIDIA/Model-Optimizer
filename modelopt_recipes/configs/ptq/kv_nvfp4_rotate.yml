quant_cfg:
  '*q_bmm_quantizer':
    enable: false
    rotate: true  # Apply Hadamard rotation to Q before quantisation to reduce outliers
  '*k_bmm_quantizer':
    num_bits: e2m1  # NVFP4 e2m1: [exponent_bits, mantissa_bits] (float4_e2m1fn)
    block_sizes:
      -1: 16        # 16-element groups along the last dimension (NVFP4 tile size)
      type: dynamic  # Block scales recomputed at each inference step
      scale_bits: e4m3  # FP8 e4m3 per-block scale factors: [exponent_bits, mantissa_bits]
    enable: true
    rotate: true  # Apply Hadamard rotation to K before quantisation to reduce outliers
  '*v_bmm_quantizer':
    num_bits: e2m1  # NVFP4 e2m1: [exponent_bits, mantissa_bits] (float4_e2m1fn)
    block_sizes:
      -1: 16        # 16-element groups along the last dimension (NVFP4 tile size)
      type: dynamic  # Block scales recomputed at each inference step
      scale_bits: e4m3  # FP8 e4m3 per-block scale factors: [exponent_bits, mantissa_bits]
    enable: true
