quant_cfg:
  '*weight_quantizer':
    num_bits: e2m1  # NVFP4 e2m1: [exponent_bits, mantissa_bits] (float4_e2m1fn)
    block_sizes:
      -1: 32        # 32-element groups along the last dimension
      type: dynamic  # Block scales recomputed at each inference step
      scale_bits: e4m3  # FP8 e4m3 per-block scale factors (NVFP4)
    enable: true
  '*input_quantizer':
    num_bits: e4m3  # FP8 e4m3: [exponent_bits, mantissa_bits] (float8_e4m3fn)
    enable: true
