quant_cfg:
  '*weight_quantizer':
    - num_bits: 4       # INT4 (primary format for storage)
      block_sizes:
        -1: 128          # 128-element groups along the last dimension
        type: static     # Block scales computed once at calibration, fixed at inference
      enable: true

    - num_bits: e4m3  # FP8 e4m3: [exponent_bits, mantissa_bits] (float8_e4m3fn) — compute format
      enable: true

  '*input_quantizer':
    num_bits: e4m3  # FP8 e4m3 per-tensor activation quantisation
    enable: true
