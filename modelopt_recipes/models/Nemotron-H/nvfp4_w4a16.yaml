# NVFP4 W4A16 (weight-only) recipe for Nemotron-H hybrid models.
#
# Coverage:
#   * Attention + MLP linears (``mixer.{q,k,v,o}_proj``,
#     ``mixer.{up,down}_proj``):  NVFP4 W4A16 weight-only.
#   * Mamba ``mixer.out_proj``:    NVFP4 W4A16 weight-only.
#   * ``lm_head``:                  bf16 (excluded).
#   * Input embedding (``backbone.embeddings``):
#                                   bf16 (excluded).
#   * Mamba ``mixer.conv1d``:      bf16 (excluded).
#   * Mamba ``mixer.in_proj``:     bf16 (excluded). Output dim 17504 is not
#                                   divisible by Marlin's FP4 tile size (64),
#                                   so quantizing it forces a downstream
#                                   dequantization fallback in the
#                                   compressed-tensors convert path; it also
#                                   destroys post-PTQ accuracy on
#                                   Nemotron-3-Nano-4B (model collapses to
#                                   repeating ``<|im_end|>``).

metadata:
  recipe_type: ptq
  description: NVFP4 W4A16 weight-only for Nemotron-H (linears only; lm_head, embedding, Mamba in_proj + conv1d stay bf16).
quantize:
  algorithm: max
  quant_cfg:
    # Start with everything disabled.
    - quantizer_name: '*'
      enable: false

    # Quantize all weight quantizers (attention q/k/v/o + MLP up/down + Mamba
    # out_proj). Specific exclusions follow.
    - quantizer_name: '*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1

    # Exclude lm_head and the input embedding (kept at bf16).
    - quantizer_name: '*lm_head*weight_quantizer'
      enable: false
    - quantizer_name: '*embeddings*weight_quantizer'
      enable: false

    # Mamba causal conv1d stays at bf16.
    - quantizer_name: '*mixer.conv1d*'
      enable: false

    # Mamba in_proj stays at bf16 — see header for the Marlin tile alignment
    # and accuracy collapse rationale.
    - quantizer_name: '*mixer.in_proj*'
      enable: false
