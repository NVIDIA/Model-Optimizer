metadata:
  recipe_type: ptq
  description: >
    NVFP4 W4A4 for MoE routed experts only (no shared experts, no attention, no KV cache).
    MSE calibration with FP8 scale sweep: weight scales are static (calibrated offline by sweeping
    all 128 FP8 E4M3 scale values to minimize quantization MSE); activations remain dynamic.
    Significantly more accurate than max calibration at the cost of longer calibration time.
    Layerwise with per-layer checkpointing for long/interruptible runs.
    Based on NVFP4_W4A4_WEIGHT_MSE_FP8_SWEEP_CFG. Targets GLM-5.1 and compatible MoE architectures.
quantize:
  algorithm:
    method: mse
    # Sweep all 128 FP8 E4M3 scale values per weight block to find minimum MSE.
    fp8_scale_sweep: true
    layerwise: true
    # Auto-resolved to <base_dir>/<model_name>_<config_hash>/ by hf_ptq.py.
    layerwise_checkpoint_dir: /raid/fridah/models/GLM-5.1-ptq-layerwise-ckpts/
  quant_cfg:
    # ── Disable everything first ─────────────────────────────────────────────
    - quantizer_name: '*'
      enable: false

    # ── Routed MoE experts: standard pattern (e.g. nn.Linear-based experts) ──
    - quantizer_name: '*mlp.experts*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          # Static: scales calibrated offline via MSE+FP8 sweep, fixed at inference.
          type: static
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*mlp.experts*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1

    # ── Routed MoE experts: Mixtral / block_sparse_moe-style ─────────────────
    - quantizer_name: '*block_sparse_moe*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: static
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*block_sparse_moe*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1

    # ── Routed MoE experts: HF transformers 5.0+ _QuantFusedExperts ──────────
    # GlmMoeDsaNaiveMoe stores weights as 3D nn.Parameters (not nn.Linear).
    # _QuantFusedExperts intercepts F.linear and registers quantizers as
    # ModuleLists named gate_up_proj_weight_quantizers / down_proj_weight_quantizers.
    - quantizer_name: '*gate_up_proj_weight_quantizers*'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: static
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*gate_up_proj_input_quantizer*'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*down_proj_weight_quantizers*'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: static
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*down_proj_input_quantizer*'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1

    # ── Explicit exclusions ───────────────────────────────────────────────────
    # Shared experts, attention projections, KV cache intentionally omitted.
    - quantizer_name: '*block_sparse_moe.gate*'
      enable: false
    - quantizer_name: '*linear_attn.conv1d*'
      enable: false
    - quantizer_name: '*lm_head*'
      enable: false
    - quantizer_name: '*mixer.conv1d*'
      enable: false
    - quantizer_name: '*mlp.gate.*'
      enable: false
    - quantizer_name: '*mlp.shared_expert_gate.*'
      enable: false
    - quantizer_name: '*output_layer*'
      enable: false
    - quantizer_name: '*proj_out.*'
      enable: false
    - quantizer_name: '*router*'
      enable: false
    - quantizer_name: 'output.*'
      enable: false
    - parent_class: 'nn.BatchNorm1d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm2d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm3d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.LeakyReLU'
      quantizer_name: '*'
      enable: false
