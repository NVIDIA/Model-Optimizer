metadata:
  recipe_type: ptq
  description: >-
    NVFP4 W4A4 for all MLP layers (dense + MoE) with MSE-search FP8 scale
    calibration on MLP weights, FP8 KV cache with constant amax (skips KV
    calibration; amax hardcoded to FP8 E4M3 max 448.0). MLP weight quantizers
    are static (per-block amax fixed by the MSE FP8-scale sweep); input
    quantizers remain dynamic.
quantize:
  algorithm:
    method: mse
    fp8_scale_sweep: true
    # Max calibration is fast and does not typically need checkpointing.
    # layerwise=false required for VLMs where the decoder layers are nested under
    # `model.language_model.layers` (layerwise_calibrate can't find them otherwise).
    layerwise: false
  quant_cfg:
    - quantizer_name: '*'
      enable: false
    - quantizer_name: '*mlp*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: static
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*mlp*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*block_sparse_moe*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: static
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*block_sparse_moe*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*[kv]_bmm_quantizer'
      enable: true
      cfg:
        num_bits: e4m3
        use_constant_amax: true
    - quantizer_name: '*block_sparse_moe.gate*'
      enable: false
    - quantizer_name: '*linear_attn.conv1d*'
      enable: false
    - quantizer_name: '*lm_head*'
      enable: false
    - quantizer_name: '*mixer.conv1d*'
      enable: false
    - quantizer_name: '*mlp.gate.*'
      enable: false
    - quantizer_name: '*mlp.shared_expert_gate.*'
      enable: false
    - quantizer_name: '*output_layer*'
      enable: false
    - quantizer_name: '*proj_out.*'
      enable: false
    - quantizer_name: '*router*'
      enable: false
    - quantizer_name: 'output.*'
      enable: false
    - parent_class: 'nn.BatchNorm1d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm2d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm3d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.LeakyReLU'
      quantizer_name: '*'
      enable: false
