metadata:
  recipe_type: ptq
  description: >-
    NVFP4 static weight and dynamic activation for all linear layers including output projections, FP8 KV cache, max calibration.

__base__:
  model_quant:
    - configs/ptq/base
    - configs/ptq/w4a4_nvfp4_mlp_only_nvfp4_mlp_only
    - configs/ptq/calib_algo_max
  kv_quant:
    - configs/ptq/kv_fp8

model_quant:
  quant_cfg:
    '*o_proj*weight_quantizer':
      block_sizes:
        -1: 16
        type: dynamic
        scale_bits:
          - 4
          - 3
      num_bits:
        - 2
        - 1
      enable: true
    '*o_proj*input_quantizer':
      block_sizes:
        -1: 16
        type: dynamic
        scale_bits:
          - 4
          - 3
      num_bits:
        - 2
        - 1
      enable: true

