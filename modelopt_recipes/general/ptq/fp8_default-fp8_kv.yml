metadata:
  recipe_type: ptq
  description: FP8 per-tensor weight and activation (W8A8), FP8 KV cache, max calibration.
ptq_cfg:
  algorithm: max
  quant_cfg:
    - path: '*input_quantizer'
      cfg:
        num_bits: e4m3
        axis:
    - path: '*weight_quantizer'
      cfg:
        num_bits: e4m3
        axis:
    - path: '*[kv]_bmm_quantizer'
      enable: true
      cfg:
        num_bits: e4m3

    - path: 'default'
      enable: false
    - path: '*block_sparse_moe.gate*'
      enable: false
    - path: '*linear_attn.conv1d*'
      enable: false
    - path: '*lm_head*'
      enable: false
    - path: '*mixer.conv1d*'
      enable: false
    - path: '*mlp.gate.*'
      enable: false
    - path: '*mlp.shared_expert_gate.*'
      enable: false
    - path: '*output_layer*'
      enable: false
    - path: '*proj_out.*'
      enable: false
    - path: '*router*'
      enable: false
    - path: 'output.*'
      enable: false
    - path: 'nn.BatchNorm1d'
      cfg:
        '*':
          enable: false
    - path: 'nn.BatchNorm2d'
      cfg:
        '*':
          enable: false
    - path: 'nn.BatchNorm3d'
      cfg:
        '*':
          enable: false
    - path: 'nn.LeakyReLU'
      cfg:
        '*':
          enable: false
