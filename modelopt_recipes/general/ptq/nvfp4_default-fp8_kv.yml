metadata:
  recipe_type: ptq
  description: NVFP4 MLP/MoE weight only (W4A16), FP8 KV cache, max calibration.
ptq_cfg:
  algorithm: max
  quant_cfg:
    - pattern: '*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - pattern: '*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - pattern: '*[kv]_bmm_quantizer'
      enable: true
      cfg:
        num_bits: e4m3

    - pattern: default
      enable: false
    - pattern: '*block_sparse_moe.gate*'
      enable: false
    - pattern: '*linear_attn.conv1d*'
      enable: false
    - pattern: '*lm_head*'
      enable: false
    - pattern: '*mixer.conv1d*'
      enable: false
    - pattern: '*mlp.gate.*'
      enable: false
    - pattern: '*mlp.shared_expert_gate.*'
      enable: false
    - pattern: '*output_layer*'
      enable: false
    - pattern: '*proj_out.*'
      enable: false
    - pattern: '*router*'
      enable: false
    - pattern: output.*
      enable: false
    - pattern: nn.BatchNorm1d
      cfg:
        '*':
          enable: false
    - pattern: nn.BatchNorm2d
      cfg:
        '*':
          enable: false
    - pattern: nn.BatchNorm3d
      cfg:
        '*':
          enable: false
    - pattern: nn.LeakyReLU
      cfg:
        '*':
          enable: false
