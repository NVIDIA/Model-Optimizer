metadata:
  recipe_type: ptq
  description: NVFP4 static weight and dynamic activation for expert layers only (W4A4), FP8 KV cache, max calibration.
ptq_cfg:
  algorithm: max
  quant_cfg:
    - quantizer_path: '*'
      enable: false
    - quantizer_path: '*mlp.experts*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_path: '*mlp.experts*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_path: '*block_sparse_moe*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_path: '*block_sparse_moe*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_path: '*[kv]_bmm_quantizer'
      enable: true
      cfg:
        num_bits: e4m3
    - quantizer_path: '*block_sparse_moe.gate*'
      enable: false
    - quantizer_path: '*linear_attn.conv1d*'
      enable: false
    - quantizer_path: '*lm_head*'
      enable: false
    - quantizer_path: '*mixer.conv1d*'
      enable: false
    - quantizer_path: '*mlp.gate.*'
      enable: false
    - quantizer_path: '*mlp.shared_expert_gate.*'
      enable: false
    - quantizer_path: '*output_layer*'
      enable: false
    - quantizer_path: '*proj_out.*'
      enable: false
    - quantizer_path: '*router*'
      enable: false
    - quantizer_path: 'output.*'
      enable: false
    - parent_class: 'nn.BatchNorm1d'
      quantizer_path: '*'
      enable: false
    - parent_class: 'nn.BatchNorm2d'
      quantizer_path: '*'
      enable: false
    - parent_class: 'nn.BatchNorm3d'
      quantizer_path: '*'
      enable: false
    - parent_class: 'nn.LeakyReLU'
      quantizer_path: '*'
      enable: false
