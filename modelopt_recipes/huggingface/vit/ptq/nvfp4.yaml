metadata:
  recipe_type: ptq
  description: >-
    HuggingFace ViT NVFP4 W4A4 PTQ recipe. Skip list mirrors modelopt.onnx
    FP8 (patch-embed Conv2d, classifier, and final vit.layernorm stay
    FP16). Encoder Linear weights/inputs run NVFP4; attention BMMs,
    softmax, and per-block LayerNorm outputs stay at FP8.
    Uses AWQ-lite calibration.
quantize:
  algorithm: awq_lite
  quant_cfg:
    - quantizer_name: '*'
      enable: false

    - parent_class: 'nn.Linear'
      quantizer_name: 'vit.encoder.layer.*.weight_quantizer'
      cfg:
        num_bits: e2m1
        axis:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
    - parent_class: 'nn.Linear'
      quantizer_name: 'vit.encoder.layer.*.input_quantizer'
      cfg:
        num_bits: e2m1
        axis:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3

    - quantizer_name: '*[qkv]_bmm_quantizer'
      cfg:
        num_bits: e4m3
        axis:

    - quantizer_name: '*softmax_quantizer'
      cfg:
        num_bits: e4m3
        axis:

    - parent_class: 'nn.LayerNorm'
      quantizer_name: 'vit.encoder.layer.*.output_quantizer'
      cfg:
        num_bits: e4m3
        axis:
