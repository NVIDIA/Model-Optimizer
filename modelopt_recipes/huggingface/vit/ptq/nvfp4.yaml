metadata:
  recipe_type: ptq
imports:
  nvfp4: configs/numerics/nvfp4
  fp8: configs/numerics/fp8
  attention_qkv_fp8: configs/ptq/units/attention_qkv_fp8
  w4a4_nvfp4_nvfp4: configs/ptq/units/w4a4_nvfp4_nvfp4
quantize:
  algorithm: awq_lite
  quant_cfg:
    - $import: w4a4_nvfp4_nvfp4

    - quantizer_name: '*output_quantizer'
      enable: false

    - $import: attention_qkv_fp8

    # Hold the patch-embed Conv2d and the classifier head at per-tensor FP8.
    - quantizer_name: '*patch_embeddings.projection.weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*patch_embeddings.projection.input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*classifier.weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*classifier.input_quantizer'
      cfg:
        $import: fp8
