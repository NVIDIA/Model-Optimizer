metadata:
  recipe_type: ptq
  description: >-
    HuggingFace ViT FP8 PTQ recipe matching modelopt.onnx FP8 layout:
    per-tensor FP8 E4M3 on encoder Linear weights + inputs, attention QKV
    BMMs and softmax outputs, MHA-aware per-block LayerNorm outputs;
    patch-embed Conv2d, classifier head, and the final LayerNorm are
    left FP16. Uses max calibration.
quantize:
  algorithm: max
  quant_cfg:
    - quantizer_name: '*'
      enable: false

    - parent_class: 'nn.Linear'
      quantizer_name: 'vit.encoder.layer.*.weight_quantizer'
      cfg:
        num_bits: e4m3
        axis:
    - parent_class: 'nn.Linear'
      quantizer_name: 'vit.encoder.layer.*.input_quantizer'
      cfg:
        num_bits: e4m3
        axis:

    - quantizer_name: '*[qkv]_bmm_quantizer'
      cfg:
        num_bits: e4m3
        axis:

    - quantizer_name: '*softmax_quantizer'
      cfg:
        num_bits: e4m3
        axis:

    - parent_class: 'nn.LayerNorm'
      quantizer_name: 'vit.encoder.layer.*.output_quantizer'
      cfg:
        num_bits: e4m3
        axis:
