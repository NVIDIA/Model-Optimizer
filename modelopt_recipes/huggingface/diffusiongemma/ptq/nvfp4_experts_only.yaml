# DiffusionGemma-specific PTQ recipe for the ``nvfp4_experts_only`` qformat.
# Equivalent to the general ``nvfp4_experts_only`` preset
# (``configs/ptq/presets/model/nvfp4_experts_only``) with the
# self-conditioning network additionally disabled, applied via the local
# ``disabled_quantizers`` unit that splices in the standard default plus
# ``*self_conditioning*``.

imports:
  base_disable_all: configs/ptq/units/base_disable_all
  experts_nvfp4: configs/ptq/units/experts_nvfp4
  disabled_quantizers: huggingface/diffusiongemma/ptq/disabled_quantizers

metadata:
  recipe_type: ptq
  description: >-
    DiffusionGemma PTQ recipe (nvfp4_experts_only): same numerics as the
    general nvfp4_experts_only preset (dynamic W4A4 NVFP4 on MoE experts only;
    attention and dense MLP stay bf16), with the self-conditioning network
    additionally disabled so text-only calibration doesn't trip on its
    uncalibrated quantizers.

quantize:
  algorithm: max
  quant_cfg:
    - $import: base_disable_all
    - $import: experts_nvfp4
    - $import: disabled_quantizers
