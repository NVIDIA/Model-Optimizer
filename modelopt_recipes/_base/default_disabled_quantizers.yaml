# YAML mirror of ``modelopt.torch.quantization.config._default_disabled_quantizer_cfg``.
# Append this list to a ``quant_cfg`` to enforce the standard exclusions:
# BatchNorm / LeakyReLU layers, the LM head (and Whisper's ``proj_out``
# alias), MoE routers / gates, and Mamba conv1d layers.
- parent_class: 'nn.BatchNorm1d'
  quantizer_name: '*'
  enable: false
- parent_class: 'nn.BatchNorm2d'
  quantizer_name: '*'
  enable: false
- parent_class: 'nn.BatchNorm3d'
  quantizer_name: '*'
  enable: false
- parent_class: 'nn.LeakyReLU'
  quantizer_name: '*'
  enable: false
- quantizer_name: '*lm_head*'
  enable: false
- quantizer_name: '*proj_out.*'  # In Whisper, lm_head has key name proj_out.
  enable: false
- quantizer_name: '*block_sparse_moe.gate*'  # MoE router
  enable: false
- quantizer_name: '*router*'  # MoE router
  enable: false
- quantizer_name: '*mlp.gate.*'  # MoE router
  enable: false
- quantizer_name: '*mlp.shared_expert_gate.*'  # MoE router
  enable: false
- quantizer_name: '*linear_attn.conv1d*'
  enable: false
- quantizer_name: '*mixer.conv1d*'  # Mamba conv1d
  enable: false
- quantizer_name: '*output_layer*'
  enable: false
- quantizer_name: 'output.*'
  enable: false
